<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Feedback System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="container">
    <h1>📚 Feedback Hub</h1>
    <p class="subtitle">Share your thoughts and help us improve</p>

    <div class="form-section">
        <h2>Submit Your Feedback</h2>
        <form action="/submit" method="post">
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
            </div>
            
            <div class="form-group">
                <label for="message">Your Feedback</label>
                <textarea id="message" name="message" placeholder="Share your thoughts, suggestions, or comments..." required></textarea>
            </div>
            
            <button type="submit">✉️ Submit Feedback</button>
        </form>
    </div>

    <div class="feedback-section">
        <h3>💬 Recent Feedback</h3>
        
        {% if feedbacks %}
            <div class="feedback-list">
                {% for name, msg in feedbacks %}
                <div class="feedback-item">
                    <div class="feedback-name">⭐ {{ name }}</div>
                    <div class="feedback-message">{{ msg }}</div>
                </div>
                {% endfor %}
            </div>
        {% else %}
            <p class="empty-message">No feedback yet. Be the first to share your thoughts!</p>
        {% endif %}
    </div>
</div>

</body>
</html>
